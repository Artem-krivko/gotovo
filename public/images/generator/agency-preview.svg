<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d18"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="25%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="80%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="800" height="500" fill="url(#darkBg)"/>
  <rect width="800" height="500" fill="url(#purpleGlow)"/>
  <rect width="800" height="500" fill="url(#blueGlow)"/>

  <!-- Grid overlay -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Header -->
  <rect width="800" height="56" fill="rgba(10,10,15,0.8)"/>
  <rect width="800" height="1" y="56" fill="rgba(255,255,255,0.06)"/>
  <!-- Logo -->
  <rect x="30" y="18" width="26" height="26" rx="8" fill="url(#btnGrad)"/>
  <text x="43" y="35" font-size="14" font-weight="800" fill="white" text-anchor="middle">V</text>
  <text x="66" y="37" font-size="15" font-weight="700" fill="white">Vortex</text>
  <!-- Nav -->
  <text x="440" y="34" font-size="12" fill="rgba(255,255,255,0.5)">Продукты</text>
  <text x="510" y="34" font-size="12" fill="rgba(255,255,255,0.5)">Кейсы</text>
  <text x="565" y="34" font-size="12" fill="rgba(255,255,255,0.5)">Цены</text>
  <text x="618" y="34" font-size="12" fill="rgba(255,255,255,0.5)">Блог</text>
  <!-- CTA button -->
  <rect x="672" y="14" width="100" height="30" rx="8" fill="url(#btnGrad)"/>
  <text x="722" y="33" font-size="12" font-weight="600" fill="white" text-anchor="middle">Начать бесплатно</text>

  <!-- Badge -->
  <rect x="290" y="75" width="220" height="26" rx="13" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <circle cx="308" cy="88" r="4" fill="#a78bfa"/>
  <text x="400" y="93" font-size="11" fill="#a78bfa" text-anchor="middle">✦ AI-агентство нового поколения</text>

  <!-- Hero H1 -->
  <text x="400" y="148" font-size="42" font-weight="800" fill="white" text-anchor="middle">Сайты которые</text>
  <text x="400" y="196" font-size="42" font-weight="800" text-anchor="middle" fill="url(#textGrad)">продают сами</text>
  <text x="400" y="234" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Разрабатываем продающие сайты с AI-ускорением.</text>
  <text x="400" y="254" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Видите результат до оплаты — за 30 секунд.</text>

  <!-- CTA buttons -->
  <rect x="228" y="276" width="170" height="42" rx="10" fill="url(#btnGrad)"/>
  <rect x="228" y="276" width="170" height="42" rx="10" fill="none" stroke="rgba(124,58,237,0.0)"/>
  <text x="313" y="301" font-size="13" font-weight="700" fill="white" text-anchor="middle">✦ Получить превью</text>
  <rect x="414" y="276" width="160" height="42" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="494" y="301" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Посмотреть кейсы</text>

  <!-- Metrics -->
  <rect x="170" y="340" width="140" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="240" y="368" font-size="22" font-weight="800" fill="white" text-anchor="middle">150+</text>
  <text x="240" y="386" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">проектов</text>

  <rect x="330" y="340" width="140" height="60" rx="12" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="400" y="368" font-size="22" font-weight="800" fill="#a78bfa" text-anchor="middle">30 сек</text>
  <text x="400" y="386" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">генерация дизайна</text>

  <rect x="490" y="340" width="140" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="560" y="368" font-size="22" font-weight="800" fill="white" text-anchor="middle">4.9 ★</text>
  <text x="560" y="386" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">средняя оценка</text>

  <!-- Bottom cards -->
  <rect y="420" width="800" height="80" fill="rgba(255,255,255,0.02)"/>
  <rect x="40" y="434" width="220" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="150" y="458" font-size="12" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Лендинги</text>
  <text x="150" y="474" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">от €500 · 7 дней</text>

  <rect x="290" y="434" width="220" height="52" rx="10" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <text x="400" y="458" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">Бизнес-сайты</text>
  <text x="400" y="474" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">от €800 · 14 дней</text>

  <rect x="540" y="434" width="220" height="52" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="650" y="458" font-size="12" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">AI-генератор</text>
  <text x="650" y="474" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle">бесплатно · 30 сек</text>
</svg>