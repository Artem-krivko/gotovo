  <rect x="164" y="265" width="136" height="116" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="164" y="265" width="136" height="4" rx="4 4 0 0" fill="#334155"/>
  <text x="232" y="295" font-family="Arial" font-size="22" text-anchor="middle">🏃</text>
  <text x="232" y="315" font-family="Arial" font-size="11" font-weight="700" fill="white" text-anchor="middle">Кардио</text>
  <text x="232" y="329" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">60 мин · Начинающие</text>
  <rect x="184" y="340" width="96" height="16" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="232" y="351" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">от 2 000 ₽/мес</text>

  <!-- Карточка 3 -->
  <rect x="312" y="265" width="136" height="116" rx="8" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="312" y="265" width="136" height="4" rx="4 4 0 0" fill="#334155"/>
  <text x="380" y="295" font-family="Arial" font-size="22" text-anchor="middle">🧘</text>
  <text x="380" y="315" font-family="Arial" font-size="11" font-weight="700" fill="white" text-anchor="middle">Йога</text>
  <text x="380" y="329" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">50 мин · Все уровни</text>
  <rect x="332" y="340" width="96" height="16" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="380" y="351" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">от 1 800 ₽/мес</text>

  <!-- Карточка 4 — CTA -->
  <rect x="460" y="265" width="124" height="116" rx="8" fill="url(#orange)"/>
  <text x="522" y="308" font-family="Arial" font-size="28" text-anchor="middle">🔥</text>
  <text x="522" y="328" font-family="Arial" font-size="12" font-weight="800" fill="white" text-anchor="middle">Все</text>
  <text x="522" y="343" font-family="Arial" font-size="12" font-weight="800" fill="white" text-anchor="middle">программы</text>
  <text x="522" y="362" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">→</text>

  <!-- Нижняя полоса -->
  <rect y="390" width="600" height="10" fill="#0d0d0d"/>
  <rect y="390" width="600" height="1" fill="rgba(249,115,22,0.15)"/>
  <text x="300" y="397" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="2">POWER GYM · Москва, Ленинский пр-т, 45 · Пн-Вс 6:00-24:00</text>
