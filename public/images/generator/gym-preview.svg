  <rect x="29" y="17" width="6" height="14" rx="1" fill="#f97316" opacity="0.7"/>
  <rect x="38" y="20" width="6" height="11" rx="1" fill="#f97316" opacity="0.4"/>
  <text x="52" y="29" font-family="Arial" font-size="14" font-weight="900" fill="white" letter-spacing="1">POWER</text>
  <text x="122" y="29" font-family="Arial" font-size="14" font-weight="900" fill="#f97316" letter-spacing="1">GYM</text>
  <!-- Навигация -->
