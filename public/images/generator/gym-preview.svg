  <line x1="0" y1="100" x2="600" y2="100" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="0" y1="140" x2="600" y2="140" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="100" y1="45" x2="100" y2="193" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="200" y1="45" x2="200" y2="193" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
  <line x1="300" y1="45" x2="300" y2="193" stroke="rgba(249,115,22,0.05)" stroke-width="1"/>
