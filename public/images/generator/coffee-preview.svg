<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- BG warm dark -->
  <rect width="800" height="500" fill="#1A1208"/>

  <!-- NAV -->
  <rect width="800" height="56" fill="#1E1510"/>
  <rect x="0" y="55" width="800" height="1" fill="#2E2010"/>
  <text x="32" y="24" font-family="Georgia,serif" font-size="10" fill="#8B7355" letter-spacing="2">☕</text>
  <text x="52" y="34" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#F5DEB3">ГРАММ</text>
  <text x="230" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#8B7355">Меню</text>
  <text x="290" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#8B7355">О нас</text>
  <text x="350" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#8B7355">События</text>
  <text x="430" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#8B7355">Контакты</text>
  <rect x="614" y="14" width="150" height="30" rx="15" fill="#C8860A"/>
  <text x="689" y="33" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Забронировать стол</text>

  <!-- HERO -->
  <rect x="0" y="56" width="800" height="200" fill="#1A1208"/>
  <!-- ambient glow -->
  <ellipse cx="400" cy="156" rx="300" ry="100" fill="#C8860A" opacity="0.06"/>

  <text x="400" y="96" font-family="system-ui,sans-serif" font-size="9" fill="#8B7355" text-anchor="middle" letter-spacing="4">SPECIALTY КОФЕ · АВТОРСКИЕ ДЕСЕРТЫ</text>
  <text x="400" y="138" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#F5DEB3" text-anchor="middle">Specialty кофе</text>
  <text x="400" y="175" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#C8860A" text-anchor="middle">с характером</text>
  <text x="400" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#6B5A3A" text-anchor="middle">Авторские напитки · Сезонные обжарки · Уютная атмосфера</text>
  <rect x="316" y="218" width="168" height="34" rx="17" fill="#C8860A"/>
  <text x="400" y="239" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Посмотреть меню</text>

  <!-- DIVIDER -->
  <rect x="0" y="256" width="800" height="1" fill="#2E2010"/>

  <!-- MENU SECTION -->
  <rect x="0" y="257" width="800" height="243" fill="#160F06"/>
  <text x="400" y="284" font-family="Georgia,serif" font-size="12" fill="#8B7355" text-anchor="middle" letter-spacing="2">Наше кофе</text>

  <!-- menu items -->
  <rect x="28" y="296" width="224" height="150" rx="8" fill="#1E1510" stroke="#2E2010" stroke-width="1"/>
  <rect x="28" y="296" width="224" height="90" rx="8" fill="#2A1E0E"/>
  <!-- cup illustration -->
  <ellipse cx="140" cy="335" rx="30" ry="8" fill="#3D2A10"/>
  <rect x="118" y="316" width="44" height="28" rx="4" fill="#4A3418"/>
  <rect x="122" y="320" width="36" height="20" rx="3" fill="#C8860A" opacity="0.4"/>
  <rect x="162" y="324" width="12" height="16" rx="8" fill="none" stroke="#4A3418" stroke-width="2"/>
  <text x="140" y="408" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#F5DEB3" text-anchor="middle">Фильтр</text>
  <text x="140" y="424" font-family="system-ui,sans-serif" font-size="9" fill="#6B5A3A" text-anchor="middle">Чистый вкус · Нет горечи</text>
  <text x="140" y="440" font-family="system-ui,sans-serif" font-size="10" fill="#C8860A" text-anchor="middle">280 ₽</text>

  <rect x="268" y="296" width="224" height="150" rx="8" fill="#1E1510" stroke="#2E2010" stroke-width="1"/>
  <rect x="268" y="296" width="224" height="90" rx="8" fill="#261A0A"/>
  <ellipse cx="380" cy="335" rx="30" ry="8" fill="#3D2A10"/>
  <rect x="358" y="308" width="44" height="36" rx="4" fill="#4A3418"/>
  <rect x="362" y="312" width="36" height="28" rx="3" fill="#C8860A" opacity="0.5"/>
  <rect x="402" y="320" width="12" height="16" rx="8" fill="none" stroke="#4A3418" stroke-width="2"/>
  <text x="380" y="408" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#F5DEB3" text-anchor="middle">Флэт Хайт</text>
  <text x="380" y="424" font-family="system-ui,sans-serif" font-size="9" fill="#6B5A3A" text-anchor="middle">Молочный · Нежный</text>
  <text x="380" y="440" font-family="system-ui,sans-serif" font-size="10" fill="#C8860A" text-anchor="middle">320 ₽</text>

  <rect x="508" y="296" width="264" height="150" rx="8" fill="#221809" stroke="#2E2010" stroke-width="1"/>
  <rect x="508" y="296" width="264" height="90" rx="8" fill="#2E1F0C"/>
  <ellipse cx="640" cy="335" rx="30" ry="8" fill="#3D2A10"/>
  <rect x="614" y="310" width="44" height="34" rx="22" fill="#4A3418"/>
  <rect x="618" y="314" width="36" height="26" rx="18" fill="#C8860A" opacity="0.6"/>
  <text x="640" y="408" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#F5DEB3" text-anchor="middle">Авторский</text>
  <text x="640" y="424" font-family="system-ui,sans-serif" font-size="9" fill="#6B5A3A" text-anchor="middle">Сезонный · Ограничен</text>
  <text x="640" y="440" font-family="system-ui,sans-serif" font-size="10" fill="#C8860A" text-anchor="middle">380 ₽</text>
  <rect x="590" y="452" width="100" height="22" rx="11" fill="#C8860A"/>
  <text x="640" y="467" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">В корзину</text>
</svg>
