name: Ping Google Indexing API

on:
  push:
    branches: [main]

jobs:
  ping-google:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deploy
        run: sleep 180

      - name: Ping Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SITE_URL: https://gotovo.studio
        run: node scripts/ping-indexing.mjs
