name: SEO Health Check

on:
  push:
    branches: [main]

jobs:
  check-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 180

      - name: Check sitemap and pages
        env:
          SITE_URL: https://www.usegotovo.by
        run: |
          echo "Checking sitemap..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/sitemap.xml")
          if [ "$STATUS" != "200" ]; then
            echo "✗ sitemap.xml returned $STATUS"
            exit 1
          fi
          echo "✓ sitemap.xml OK"

          echo ""
          echo "Checking pages from sitemap..."
          URLS=$(curl -s "$SITE_URL/sitemap.xml" | grep -oP '(?<=<loc>)[^<]+')
          FAIL=0
          for URL in $URLS; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$CODE" = "200" ]; then
              echo "✓ $URL"
            else
              echo "✗ $URL ($CODE)"
              FAIL=1
            fi
          done

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "Some pages returned errors"
            exit 1
          fi

          echo ""
          echo "All pages OK"
